<!DOCTYPE html>
<html>
<head>
<title>Student Management</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    background:pink;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#880e4f;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff0f6;
    padding:20px;
    border-radius:10px;
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

input{
    padding:8px;
    border:1px solid #ff69b4;
    border-radius:5px;
}

input:focus{
    outline:none;
    border:1px solid #d81b60;
}

button{
    padding:8px;
    border:none;
    background:#ff69b4;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#d81b60;
}

.search-box{
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ffb6d9;
    padding:8px;
    text-align:center;
}

th{
    background:#ff69b4;
    color:white;
}

.edit{
    background:#ec407a;
}

.delete{
    background:#d81b60;
}

@media(max-width:600px){
    form{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<h1>Student Management</h1>

<div class="container">

<form id="form">
    <input type="text" id="name" placeholder="Name" required>
    <input type="number" id="number" placeholder="Number" required>
    <input type="number" id="age" placeholder="Age" required>
    <input type="text" id="course" placeholder="Course" required>
    <button type="submit">Save</button>
</form>

<div class="search-box">
    <input type="text" id="search" placeholder="Search by Name, Age, Number, Course">
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Number</th>
<th>Age</th>
<th>Course</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>
let students=[];
let editIndex=-1;

const form=document.getElementById("form");
const tbody=document.getElementById("tbody");
const search=document.getElementById("search");

const nameInput=document.getElementById("name");
const numberInput=document.getElementById("number");
const ageInput=document.getElementById("age");
const courseInput=document.getElementById("course");

function show(data=students){
    tbody.innerHTML="";
    data.forEach((s,i)=>{
        tbody.innerHTML+=`
        <tr>
            <td>${s.name}</td>
            <td>${s.number}</td>
            <td>${s.age}</td>
            <td>${s.course}</td>
            <td>
                <button class="edit" onclick="edit(${i})">Edit</button>
                <button class="delete" onclick="del(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

form.onsubmit=function(e){
    e.preventDefault();

    const data={
        name:nameInput.value,
        number:numberInput.value,
        age:ageInput.value,
        course:courseInput.value
    };

    if(editIndex==-1){
        students.push(data);
    }else{
        students[editIndex]=data;
        editIndex=-1;
    }

    form.reset();
    show();
};

function edit(i){
    const s=students[i];
    nameInput.value=s.name;
    numberInput.value=s.number;
    ageInput.value=s.age;
    courseInput.value=s.course;
    editIndex=i;
}

function del(i){
    students.splice(i,1);
    show();
}

search.oninput=function(){
    const value=this.value.toLowerCase();
    const filtered=students.filter(s =>
        s.name.toLowerCase().includes(value) ||
        s.number.toLowerCase().includes(value) ||
        s.age.toString().includes(value) ||
        s.course.toLowerCase().includes(value)
    );
    show(filtered);
};
</script>

</body>
</html>
